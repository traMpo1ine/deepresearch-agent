services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LLM_BACKEND: mock
      REDIS_URL: redis://redis:6379/0
      WIKIPEDIA_LANGUAGE: zh
      DEMO_MAX_ACTIVE_RUNS: 2
      DEMO_MAX_UPLOAD_BYTES: 10485760
      DEMO_EXECUTION_MODE: worker
      DEMO_RUN_STORE_PATH: /app/reports/demo_runs/run_registry.sqlite3
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - deepresearch_demo_runs:/app/reports/demo_runs
      - deepresearch_uploads:/app/data/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=2)",
        ]
      interval: 15s
      timeout: 3s
      start_period: 20s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    command: ["python", "scripts/run_demo_worker.py"]
    environment:
      LLM_BACKEND: mock
      REDIS_URL: redis://redis:6379/0
      WIKIPEDIA_LANGUAGE: zh
      DEMO_RUN_STORE_PATH: /app/reports/demo_runs/run_registry.sqlite3
      DEMO_WORKER_LEASE_SECONDS: 120
      DEMO_WORKER_MAX_ATTEMPTS: 3
      DEMO_WORKER_POLL_SECONDS: 1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - deepresearch_demo_runs:/app/reports/demo_runs
      - deepresearch_uploads:/app/data/uploads
    healthcheck:
      disable: true

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    volumes:
      - deepresearch_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  deepresearch_demo_runs:
  deepresearch_uploads:
  deepresearch_redis_data:
