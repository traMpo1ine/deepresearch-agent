name: Live Source Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

concurrency:
  group: live-source-monitor
  cancel-in-progress: false

jobs:
  live-source-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OUT_DIR: reports/live_source_eval/github_actions_${{ github.run_id }}
      HISTORY_DIR: reports/live_source_history
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Restore rolling history
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HISTORY_DIR }}
          key: live-source-history-${{ github.run_id }}
          restore-keys: |
            live-source-history-

      - name: Run 12-case live-source evaluation
        run: uv run python scripts/run_live_source_eval.py --output-dir "$OUT_DIR"

      - name: Append history and enforce latest pass
        run: >-
          uv run python scripts/update_live_source_history.py
          --metrics "$OUT_DIR/metrics.json"
          --history "$HISTORY_DIR/history.jsonl"
          --report "$HISTORY_DIR/report.md"
          --run-id "${{ github.run_id }}"
          --fail-on-error

      - name: Save rolling history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.HISTORY_DIR }}
          key: live-source-history-${{ github.run_id }}

      - name: Upload evaluation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-source-evidence-${{ github.run_id }}
          path: |
            ${{ env.OUT_DIR }}
            ${{ env.HISTORY_DIR }}
          if-no-files-found: error
          retention-days: 30
