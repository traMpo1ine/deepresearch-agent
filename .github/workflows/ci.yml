name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Ruff and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra dev --extra web

      - name: Lint
        run: uv run ruff check src tests scripts

      - name: Compile
        run: uv run python -m compileall src scripts tests

      - name: Retrieval regression gate
        run: >-
          uv run python scripts/run_retrieval_eval.py
          --output-dir reports/retrieval_eval/ci
          --min-hybrid-recall-at-max-k 0.84

      - name: Completion check
        run: uv run python scripts/check_project_completion.py

      - name: Test
        id: pytest
        continue-on-error: true
        run: uv run pytest --junitxml=reports/pytest-ci.xml

      - name: Annotate test failures
        if: steps.pytest.outcome == 'failure'
        run: uv run python scripts/annotate_junit_failures.py reports/pytest-ci.xml

      - name: Enforce test result
        if: steps.pytest.outcome == 'failure'
        run: exit 1
